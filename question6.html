 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Survey Form</title>
      <style>
/* Container & Body */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f7f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

form {
    background: #ffffff;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Fieldset and Legend */
fieldset {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
}

legend {
    font-weight: bold;
    color: #2c3e50;
    font-size: 1.2rem;
    padding: 0 10px;
}

/* Question Label */
.questions {
    display: block;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 15px;
    color: #34495e;
}

/* Individual Option Labels */
fieldset label:not(.questions) {
    display: flex;
    align-items: center;
    background: #f8f9fa;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s, border 0.3s;
    border: 1px solid transparent;
}

fieldset label:not(.questions):hover {
    background: #eef2ff;
    border-color: #4f46e5;
}

/* Checkbox Size */
input[type="checkbox"] {
    margin-right: 12px;
    width: 18px;
    height: 18px;
    cursor: pointer;
}

footer {
    display: flex;
    justify-content: space-between; /* This creates the left/right split */
    align-items: center;
    margin-top: 30px;
    padding: 10px 0;
}

/* Button Styling */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    background-image: linear-gradient( 98.4deg,  rgba(254,251,191,1) 16.6%, rgba(187,240,211,1) 81.8% );
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    font-weight: bold;
}

button:hover {
    background-color:whitesmoke;
    transform: translateY(-2px); /* Subtle lift effect */
}

button a {
    color: #020024;
    text-decoration: none;
    font-weight: bold;
    display: block; /* Makes the entire button clickable, not just the text */
}
#left-side {
    float: left;
}

#right-side {
    float: right;
}

</style>
</head>
<body>
    <form>
               <fieldset>
                        <legend><em>Quiz</em></legend>
                        <label  id="q6" class="questions">6.Which of these are "Front-end" technologies?</label>
                          <label><input type="checkbox" name="q6" value="HTML"> HTML</label>
                          <label><input type="checkbox" name="q6" value="CSS"> CSS</label>
                          <label><input type="checkbox" name="q6" value="JavaScript"> JavaScript</label>
                          <label><input type="checkbox" name="q6" value="MySQL" > MySQL</label>
                 </fieldset>
                 <footer>
                 <div id="left-side">
                            <button ><a href="question5.html">Previous</a></button>
                        </div>
                    <div id="right-side">
                            <button ><a href="question7.html">Next</a></button>
                        </div>
                 </footer>   
        </form>
     
</body>
</html>
